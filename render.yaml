services:
  # ---------- FastAPI Backend ----------
  - type: web
    name: fraud-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # ---------- Streamlit Frontend ----------
  - type: web
    name: fraud-gui
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run src/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_URL
        # The GUI will call this URL to get predictions.
        # The service name must match the API service name above.
        value: https://fraud-api.onrender.com
      - key: PYTHON_VERSION
        value: 3.10.0
